<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate</title>

<style>
body{
    margin:0;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial,sans-serif;
}

.certificate{
    width:90%;
    max-width:800px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.certificate img{
    width:100%;
    display:block;
}
</style>
</head>

<body>

<div class="certificate">
    <img src="certificate.jpg" alt="Certificate">
</div>

</body>
</html>
