<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate | Asrar Reyaz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scrollbar-gutter: stable;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navigation */
        nav {
            background-color: #0a0a0a;
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #4ade80;
            box-shadow: 0 2px 10px rgba(74, 222, 128, 0.1);
            flex-shrink: 0;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            min-height: 60px;
            width: 100%;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #4ade80;
            flex-shrink: 0;
            z-index: 101;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
            flex-shrink: 0;
        }

        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            white-space: nowrap;
        }

        .nav-links a:hover {
            background-color: #4ade80;
            color: #000000;
            transform: scale(1.05);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 6px;
            width: 30px;
            height: 24px;
            justify-content: center;
            position: relative;
            z-index: 102;
        }

        .hamburger span {
            width: 100%;
            height: 3px;
            background-color: #4ade80;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: block;
            position: absolute;
        }

        .hamburger span:nth-child(1) {
            top: 0;
        }
        .hamburger span:nth-child(2) {
            top: 10px;
            opacity: 1;
        }
        .hamburger span:nth-child(3) {
            bottom: 0;
        }

        .hamburger.active span:nth-child(1) {
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            bottom: 50%;
            transform: translateY(50%) rotate(-45deg);
        }

        /* Overlay */
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 98;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .menu-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Certificate Section */
        .certificate-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #000000 0%, #0a0a2e 50%, #000000 100%);
            position: relative;
            overflow: hidden;
        }

        .certificate-section::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: 20%;
            left: 5%;
            animation: float 6s ease-in-out infinite;
        }

        .certificate-section::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            bottom: 20%;
            right: 5%;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(30px); }
        }

        .certificate-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 800px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 12px;
            padding: 8px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(74, 222, 128, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .certificate-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 35px rgba(74, 222, 128, 0.2);
        }

        .certificate-img {
            width: 100%;
            display: block;
            border-radius: 8px;
        }

        .certificate-caption {
            text-align: center;
            margin-top: 12px;
            font-size: 0.9rem;
            color: #4ade80;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive Sidebar */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 1.5rem;
            }

            .nav-links {
                position: fixed;
                top: 0;
                right: -100%;
                width: 280px;
                height: 100vh;
                background-color: #0a0a0a;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 80px;
                padding-left: 20px;
                padding-right: 20px;
                gap: 1.5rem;
                border-left: 2px solid #4ade80;
                transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
                z-index: 99;
                box-shadow: -10px 0 30px rgba(0, 0, 0, 0.8);
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                font-size: 1.3rem;
                text-align: left;
                width: 100%;
                padding: 15px 20px;
                border-radius: 8px;
            }

            .hamburger {
                display: flex;
            }

            .certificate-section {
                padding: 1rem;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                padding: 0 1rem;
                min-height: 55px;
            }
            .nav-links {
                width: 250px;
            }
            .logo {
                font-size: 1.3rem;
            }
            .hamburger {
                width: 28px;
                height: 22px;
                gap: 5px;
            }
            .hamburger span {
                height: 2.5px;
            }
            .hamburger span:nth-child(2) {
                top: 9px;
            }
            .certificate-container {
                padding: 4px;
            }
        }
    </style>
</head>

<body>
    <div class="menu-overlay" id="menuOverlay"></div>

    <nav>
        <div class="navbar">
            <div class="logo">Asrar Reyaz</div>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="developer.html">About Me</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="certificate.html">Certificate</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Certificate Display -->
    <section class="certificate-section">
        <div class="certificate-container">
            <img src="certificate.jpg" alt="Certificate of Achievement" class="certificate-img">
            <p class="certificate-caption">Certificate of Excellence</p>
        </div>
    </section>

    <script>
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('navLinks');
        const menuOverlay = document.getElementById('menuOverlay');

        function toggleMenu() {
            hamburger.classList.toggle('active');
            navLinks.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : 'auto';
        }

        hamburger.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMenu();
        });

        navLinks.querySelectorAll('a').forEach(item => {
            item.addEventListener('click', () => {
                if (navLinks.classList.contains('active')) {
                    toggleMenu();
                }
            });
        });

        menuOverlay.addEventListener('click', () => {
            if (navLinks.classList.contains('active')) {
                toggleMenu();
            }
        });
    </script>
</body>
</html>
